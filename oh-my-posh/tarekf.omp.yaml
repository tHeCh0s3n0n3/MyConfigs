# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json
version: 3
final_space: true
console_title_template: '{{ if .Root }}Administrator: {{ end }}{{ if contains .Shell "pwsh" }}Powershell{{ else }}{{ .Shell }}{{ end }} in {{ .Folder }}'
blocks:
  - type: prompt
    alignment: left
    segments:
      - properties:
          cache_duration: none
        template: '{{ if .WSL }}WSL {{ end }}{{ .Icon }} '
        foreground: '#ffffff'
        background: transparent
        type: os
        style: plain
      - properties:
          cache_duration: none
        template: " \U0000F007 {{ .UserName }} "
        foreground: '#000000'
        background: '#FDD835'
        type: session
        style: plain
      - properties:
          cache_duration: none
        leading_diamond: ""
        template: " {{if .SSHSession }}\U000F0318{{ else }}\U000F01C5{{ end }} {{ .HostName }} "
        foreground: '#FDD835'
        background: '#000000'
        type: session
        style: diamond
      - properties:
          cache_duration: none
          folder_separator_icon: " \U0000E0B1 "
          home_icon: "\U0000F015"
          style: folder
        template: " \U000F024B {{ .Path }}{{ if not .Writable }} \U000F033E{{ end }} "
        foreground: '#ffffff'
        powerline_symbol: "\U0000E0B0"
        background: '#ff479c'
        type: path
        style: powerline
      - properties:
          cache_duration: none
          fetch_version: true
          fetch_sdk_version: true
        template: " \U000F0AAE {{ .Full}} "
        foreground: '#ffffff'
        powerline_symbol: "\U0000E0B0"
        background: '#512bd4'
        type: dotnet
        style: powerline
      - properties:
          cache_duration: none
          fetch_version: true
        template: " \U000F0399 {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }} "
        foreground: '#ffffff'
        powerline_symbol: "\U0000E0B0"
        background: '#6CA35E'
        type: node
        style: powerline
      - properties:
          cache_duration: none
          fetch_version: true
        template: " \U0000E724 {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
        foreground: '#111111'
        powerline_symbol: "\U0000E0B0"
        background: '#8ED1F7'
        type: go
        style: powerline
      - properties:
          cache_duration: none
          fetch_version: true
        template: " \U0000E624 {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
        foreground: '#111111'
        powerline_symbol: "\U0000E0B0"
        background: '#4063D8'
        type: julia
        style: powerline
      - properties:
          cache_duration: none
          display_mode: files
          fetch_virtual_env: false
        template: " \U000F0320 {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
        foreground: '#111111'
        powerline_symbol: "\U0000E0B0"
        background: '#FFDE57'
        type: python
        style: powerline
      - properties:
          cache_duration: none
          display_mode: files
          fetch_version: true
        template: " \U0000E791 {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
        foreground: '#ffffff'
        powerline_symbol: "\U0000E0B0"
        background: '#AE1401'
        type: ruby
        style: powerline
      - properties:
          cache_duration: none
          display_mode: files
        template: " \U0000E73D {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
        foreground: '#ffffff'
        powerline_symbol: "\U0000E0B0"
        background: '#4063D8'
        type: php
        style: powerline
      - properties:
          cache_duration: none
          display_mode: files
          fetch_version: false
        template: " \U0000F0E7 {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }} "
        foreground: '#ffffff'
        powerline_symbol: "\U0000E0B0"
        background: '#FEAC19'
        type: azfunc
        style: powerline
      - properties:
          cache_duration: none
          display_default: false
        template: " \U0000E7AD {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} "
        foreground: '#ffffff'
        powerline_symbol: "\U0000E0B0"
        type: aws
        style: powerline
        background_templates:
          - '{{if contains "default" .Profile}}#FFA400{{end}}'
          - '{{if contains "jan" .Profile}}#f1184c{{end}}'
      - properties:
          branch_max_length: 25
          cache_duration: none
          fetch_stash_count: true
          fetch_status: true
          fetch_upstream_icon: true
        leading_diamond: "\U0000E0B6"
        template: " {{ .UpstreamIcon }}{{ .HEAD }}{{ .BranchStatus }}{{ if .Working.Changed }} \U0000F044 {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} \U0000F046 {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} \U000F0193 {{ .StashCount }}{{ end }} "
        foreground: '#193549'
        powerline_symbol: "\U0000E0B0"
        background: '#fffb38'
        type: git
        style: powerline
        background_templates:
          - '{{ if or (.Working.Changed) (.Staging.Changed) }}#FF9248{{ end }}'
          - '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#ff4500{{ end }}'
          - '{{ if gt .Ahead 0 }}#B388FF{{ end }}'
          - '{{ if gt .Behind 0 }}#B388FF{{ end }}'
      - properties:
          cache_duration: none
        template: ' # '
        foreground: '#111111'
        powerline_symbol: "\U0000E0B0"
        background: '#ffff66'
        type: root
        style: powerline

