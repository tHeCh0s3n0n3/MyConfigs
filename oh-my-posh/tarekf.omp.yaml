# Icon Reference
# | Purpose                  | NF Name                     | Glyph | Hex Code   |
# |--------------------------|-----------------------------|-------|------------|
# | Session (User)           | nf-fa-user                  |      | \uF007     |
# | Session (SSH)            | nf-md-connection            | 󰌘     | \U000F0718 |
# | Session (Host)           | nf-md-desktop_tower         | 󰇅     | \U000F01C5 |
# | Path (Folder)            | nf-md-folder                | 󰉋     | \U000F024B |
# | Path (Home)              | nf-fa-home                  |      | \uF015     |
# | Path (Lock)              | nf-md-lock                  | 󰌾     | \U000F073E |
# | Path (Separator)         | nf-pl-left_soft_divider     |      | \uE0B1     |
# | Git (Leading)            | nf-pl-left_hard_divider_arc |    | \uE0B6     |
# | Git (Modified)           | nf-fa-edit                  |      | \uF044     |
# | Git (Staged)             | nf-fa-check_square_o        |      | \uF046     |
# | Git (Stash)              | nf-md-archive               | 󰆓     | \U000F0193 |
# | .NET                     | nf-md-microsoft_dot_net     | 󰪮     | \U000F0AAA |
# | Node                     | nf-md-nodejs                | 󰎙     | \U000F0399 |
# | Go                       | nf-dev-go                   |      | \uE724     |
# | Julia                    | nf-seti-julia               |      | \uE80D     |
# | Python                   | nf-md-language_python       | 󰌠     | \U000F0720 |
# | Ruby                     | nf-dev-ruby                 |      | \uE739     |
# | PHP                      | nf-md-language_php          | 󰌟     | \U000F071F |
# | Azure Functions          | nf-fa-bolt                  |      | \uF0E7     |
# | AWS                      | nf-dev-aws                  |      | \uE7AD     |
# | Powerline Hard Separator | nf-pl-left_hard_divider     |      | \uE0B0     |
# | Powerline Right Separator| nf-pl-right_hard_divider    |      | \uE0B2     |
# | Execution Time           | nf-mdi-timer                | ﮫ     | \uFBAD     |
# | Battery Charged          | nf-md-battery               |      | \uE22F     |
# | Battery Charging         | nf-md-battery_charging      |      | \uE234     |
# | Battery Discharging      | nf-md-battery_negative      |      | \uE231     |
# | Battery Percent          | nf-md-percent               |      | \uF4A5     |
